name: Android CI

on:
  push:
    branches: [ "ff" ]
    tags-ignore:
      - 'v*'          # Les releases taggées sont gérées par release.yml
  pull_request:
    branches: [ "ff" ]
  schedule:
    - cron: '0 0 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 🔹 Checkout du code et des submodules
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0        # nécessaire pour récupérer la date git

      # 🔹 Installation JDK 17 et cache Gradle
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 🔹 Permission pour gradlew
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 🔹 Génération du seed pour applicationId
      - name: Generate package-name seed
        id: seed
        run: echo "NUMBER=$(shuf -i 1-10000 -n 1)" >> $GITHUB_OUTPUT

      # 🔹 Nettoyage + compilation APK universel
      - name: Clean and Build Release APK
        run: ./gradlew clean :app:assembleUniversalRelease -PPACKAGE_NAME_SEED=${{ steps.seed.outputs.NUMBER }} --no-daemon --stacktrace

      # 🔹 Upload de l’APK et mapping ProGuard
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rvxp-ci-release-apk
          retention-days: 14
          path: |
            app/build/outputs/apk/universal/release/*.apk
            app/build/outputs/mapping/universalRelease/mapping.txt

      # 🔹 Publication automatique sur GitHub Release
      - name: Publish autobuild release
        if: >
          github.event_name != 'pull_request' &&
          github.repository == github.event.repository.full_name
        run: |
          # Variables git
          GIT_DESCRIBE=$(git rev-parse --short HEAD)
          GIT_COMMIT_DATE=$(git log -1 --format=%cd --date=format:%y%m%d)

          # Nom unique de l’APK
          APK_NAME="ReVancedXposedSpotify-${GIT_COMMIT_DATE}-${GIT_DESCRIBE}.apk"

          # Copie de l’APK universel
          cp app/build/outputs/apk/universal/release/app-universal-release.apk "${APK_NAME}"

          # Supprime la release existante si elle existe
          gh release delete autobuild --yes || true

          # Création d’une nouvelle release autobuild
          gh release create autobuild "${APK_NAME}" \
            --prerelease \
            --title "Nightly build ${GIT_COMMIT_DATE}" \
            --notes "Automated nightly build from commit \`${GIT_DESCRIBE}\`.

> Le package name et la signature de ce build changent chaque jour. Vous **n’êtes pas obligé** de réinstaller tous les jours."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
