name: Android CI

on:
  push:
    branches: [ "ff" ]
    tags-ignore: [ 'v*' ]
  pull_request:
    branches: [ "ff" ]
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      - name: Generate package-name seed
        id: seed
        run: echo "NUMBER=$(shuf -i 1-10000 -n 1)" >> $GITHUB_OUTPUT

      - name: Clean & Build APK
        run: ./gradlew clean :app:assembleUniversalRelease -PPACKAGE_NAME_SEED=${{ steps.seed.outputs.NUMBER }} --stacktrace

      - name: Locate APK
        id: locate_apk
        run: |
          APK=$(find app/build/outputs/apk/ -name "*universal-release.apk" | head -n1)
          if [[ ! -f "$APK" ]]; then
            echo "APK not found!"
            exit 1
          fi
          echo "APK=$APK" >> $GITHUB_OUTPUT

      - name: Prepare release files
        run: |
          mkdir -p release
          cp "${{ steps.locate_apk.outputs.APK }}" release/app.apk
          # Copier mapping.txt seulement si existe
          if [ -f "app/build/outputs/mapping/universalRelease/mapping.txt" ]; then
            cp app/build/outputs/mapping/universalRelease/mapping.txt release/mapping.txt
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rvxp-release
          path: release/

      - name: Publish autobuild release
        if: github.event_name != 'pull_request'
        run: |
          GIT_HASH=$(git rev-parse --short HEAD)
          GIT_DATE=$(git log -1 --format=%cd --date=format:%y%m%d)
          APK_NAME="ReVancedXposedSpotify-${GIT_DATE}-${GIT_HASH}.apk"
          cp release/app.apk "${APK_NAME}"
          gh release delete autobuild --yes || true
          gh release create autobuild "${APK_NAME}" \
            --prerelease \
            --title "Nightly build ${GIT_DATE}" \
            --notes "Automated nightly build from commit ${GIT_HASH}."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
